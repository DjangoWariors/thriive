# Thriive IMS — Nginx site.
# Placeholders __DOMAIN__ / __APP_DIR__ are substituted by deploy/setup.sh.
# React SPA is served statically; /api, /admin, /static, /media go to Django.

upstream thriive_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name __DOMAIN__;

    # SPA build output.
    root __APP_DIR__/frontend/dist;
    index index.html;

    client_max_body_size 25m;      # bulk CSV/invoice uploads

    # --- React Router: everything not a real file falls back to index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Django API + admin ---
    location ~ ^/(api|admin)/ {
        proxy_pass http://thriive_gunicorn;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;           # long report/export requests
    }

    # --- Django collected static (admin, DRF, drf-spectacular UI) ---
    location /static/ {
        alias __APP_DIR__/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- User-uploaded media ---
    location /media/ {
        alias __APP_DIR__/backend/media/;
        expires 7d;
    }

    # Hashed Vite assets are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
